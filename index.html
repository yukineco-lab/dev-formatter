<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Formatter</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3148;
      --accent: #7c6af7;
      --accent-hover: #6a58e0;
      --text: #e2e4f0;
      --text-muted: #7a7f99;
      --success: #3ecf8e;
      --error: #f77066;
      --radius: 8px;
      --font-mono: 'Consolas', 'Menlo', 'Monaco', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #d0d0d0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #333333;
    }

    header .badge {
      font-size: 11px;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .tabs {
      display: flex;
      gap: 2px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--bg);
    }

    main {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .panel { display: none; flex: 1; flex-direction: column; gap: 16px; }
    .panel.active { display: flex; }

    .options-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .options-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .options-row label input[type=checkbox] {
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
    }

    .options-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
    }

    @media (max-width: 800px) {
      .editor-grid { grid-template-columns: 1fr; }
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pane-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pane-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .pane-actions {
      display: flex;
      gap: 6px;
    }

    textarea {
      flex: 1;
      min-height: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea[readonly] { background: var(--surface2); cursor: default; }
    textarea.error { border-color: var(--error); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); background: var(--border); }

    .btn-icon {
      padding: 5px 10px;
      font-size: 12px;
    }

    .action-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .status.ok  { background: rgba(62,207,142,0.15); color: var(--success); }
    .status.err { background: rgba(247,112,102,0.15); color: var(--error); }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      font-family: var(--font-mono);
      padding: 8px 12px;
      background: rgba(247,112,102,0.08);
      border-radius: var(--radius);
      border: 1px solid rgba(247,112,102,0.2);
      display: none;
    }
    .error-msg.visible { display: block; }

    .dir-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .dir-btn { background: var(--surface2); border: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 7px 18px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .dir-btn:hover { color: var(--text); }
    .dir-btn.active { background: var(--accent); color: #fff; }

    #conv-log { padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    #conv-log .pane-label { margin-bottom: 8px; }
    .log-item { font-size: 12px; color: var(--success); padding: 2px 0; font-family: var(--font-mono); }
    .log-item::before { content: '✓  '; }
  </style>
</head>
<body>

<header>
  <img src="/favicon.png" alt="" style="width:24px;height:24px;">
  <h1>Dev Formatter</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="sql">SQL整形</button>
  <button class="tab-btn" data-tab="convert">SQL変換</button>
  <button class="tab-btn" data-tab="json">JSON整形</button>
</div>

<main>

  <!-- SQL Panel -->
  <div class="panel active" id="tab-sql">
    <div class="options-row">
      <span style="font-size:13px; color:var(--text-muted)">方言:</span>
      <select id="sql-dialect">
        <option value="sql">標準SQL</option>
        <option value="mysql">MySQL</option>
        <option value="postgresql" selected>PostgreSQL</option>
        <option value="sqlite">SQLite</option>
        <option value="oracle">Oracle</option>
        <option value="transactsql">T-SQL (SQL Server)</option>
      </select>
      <label><input type="checkbox" id="sql-uppercase" checked> キーワード大文字</label>
      <label><input type="checkbox" id="sql-indent2"> インデント2スペース</label>
      <label><input type="checkbox" id="sql-join-on-newline" checked> JOIN の ON を改行</label>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="sql-format-btn">整形</button>
      <button class="btn btn-ghost" id="sql-clear-btn">クリア</button>
      <span class="status" id="sql-status" style="display:none"></span>
    </div>

    <div class="error-msg" id="sql-error"></div>

    <div class="editor-grid">
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">入力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="sql-paste-btn">貼り付け</button>
          </div>
        </div>
        <textarea id="sql-input" placeholder="整形したいSQLを貼り付けてください..."></textarea>
      </div>
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">出力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="sql-copy-btn">コピー</button>
          </div>
        </div>
        <textarea id="sql-output" readonly placeholder="整形結果がここに表示されます"></textarea>
      </div>
    </div>
  </div>

  <!-- JSON Panel -->
  <div class="panel" id="tab-json">
    <div class="options-row">
      <label><input type="checkbox" id="json-urldecode" checked> URLデコードしてから整形</label>
      <label><input type="checkbox" id="json-unescape"> JSONエスケープを解除してから整形</label>
      <label><input type="checkbox" id="json-sort"> キーをソート</label>
      <span style="font-size:13px; color:var(--text-muted)">インデント:</span>
      <select id="json-indent">
        <option value="2" selected>2スペース</option>
        <option value="4">4スペース</option>
        <option value="tab">タブ</option>
      </select>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="json-format-btn">整形</button>
      <button class="btn btn-ghost" id="json-urldecode-only-btn">URLデコードのみ</button>
      <button class="btn btn-ghost" id="json-minify-btn">圧縮</button>
      <button class="btn btn-ghost" id="json-escape-minify-btn">エスケープして1行化</button>
      <button class="btn btn-ghost" id="json-clear-btn">クリア</button>
      <span class="status" id="json-status" style="display:none"></span>
    </div>

    <div class="error-msg" id="json-error"></div>

    <div class="editor-grid">
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">入力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="json-paste-btn">貼り付け</button>
          </div>
        </div>
        <textarea id="json-input" placeholder="整形したいJSONを貼り付けてください...&#10;&#10;URLエンコードされたJSONもそのまま貼り付け可能です。"></textarea>
      </div>
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">出力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="json-copy-btn">コピー</button>
          </div>
        </div>
        <textarea id="json-output" readonly placeholder="整形結果がここに表示されます"></textarea>
      </div>
    </div>
  </div>

  <!-- 変換 Panel -->
  <div class="panel" id="tab-convert">
    <div class="options-row">
      <span style="font-size:13px; color:var(--text-muted)">変換方向:</span>
      <div class="dir-toggle">
        <button class="dir-btn active" data-dir="ora2pg">Oracle → PostgreSQL</button>
        <button class="dir-btn" data-dir="pg2ora">PostgreSQL → Oracle</button>
      </div>
      <label><input type="checkbox" id="conv-format"> 変換後に整形する</label>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="conv-btn">変換</button>
      <button class="btn btn-ghost" id="conv-clear-btn">クリア</button>
      <span class="status" id="conv-status" style="display:none"></span>
    </div>

    <div class="error-msg" id="conv-error"></div>

    <div class="editor-grid">
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">入力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="conv-paste-btn">貼り付け</button>
          </div>
        </div>
        <textarea id="conv-input" placeholder="変換したいSQLを貼り付けてください..."></textarea>
      </div>
      <div class="editor-pane">
        <div class="pane-header">
          <span class="pane-label">出力</span>
          <div class="pane-actions">
            <button class="btn btn-ghost btn-icon" id="conv-copy-btn">コピー</button>
          </div>
        </div>
        <textarea id="conv-output" readonly placeholder="変換結果がここに表示されます"></textarea>
      </div>
    </div>

    <div id="conv-log" style="display:none">
      <div class="pane-label">変換ログ</div>
      <div id="conv-log-list"></div>
    </div>
  </div>

</main>

<!-- sql-formatter via CDN (処理はすべてブラウザ内で完結、データ送信なし) -->
<script src="https://cdn.jsdelivr.net/npm/sql-formatter@15/dist/sql-formatter.min.js"></script>
<script>
// ── タブ切り替え ──────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── ユーティリティ ────────────────────────────────────────
function showStatus(id, ok, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : 'err');
  el.style.display = 'inline-block';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (msg) { el.textContent = msg; el.classList.add('visible'); }
  else      { el.textContent = ''; el.classList.remove('visible'); }
}

async function copyText(text, statusId) {
  try {
    await navigator.clipboard.writeText(text);
    showStatus(statusId, true, 'コピーしました');
  } catch {
    showStatus(statusId, false, 'コピー失敗');
  }
}

async function pasteText(targetId) {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById(targetId).value = text;
  } catch {
    // クリップボード権限がない場合は無視
  }
}

// ── SQL ──────────────────────────────────────────────────

function postProcessJoinOn(sql) {
  return sql.split('\n').map(line => {
    if (!/\bJOIN\b/i.test(line)) return line;
    const onIdx = line.search(/\s+ON\s+/i);
    if (onIdx === -1) return line;
    const indent = line.match(/^(\s*)/)[1];
    const beforeOn = line.substring(0, onIdx);
    const onPart   = line.substring(onIdx).replace(/^\s+ON\s+/i, 'ON ');
    return beforeOn + '\n' + indent + '  ' + onPart;
  }).join('\n');
}

function formatSQL() {
  const input = document.getElementById('sql-input').value.trim();
  const output = document.getElementById('sql-output');
  const errEl  = document.getElementById('sql-error');

  showError('sql-error', '');
  output.classList.remove('error');

  if (!input) return;

  const dialect  = document.getElementById('sql-dialect').value;
  const upper    = document.getElementById('sql-uppercase').checked;
  const indent   = document.getElementById('sql-indent2').checked ? '  ' : '    ';

  const joinOnNewline = document.getElementById('sql-join-on-newline').checked;

  try {
    let result = sqlFormatter.format(input, {
      language: dialect,
      keywordCase: upper ? 'upper' : 'preserve',
      indentStyle: 'standard',
      tabWidth: indent.length,
    });
    if (joinOnNewline) result = postProcessJoinOn(result);
    output.value = result;
    showStatus('sql-status', true, '整形完了');
  } catch (e) {
    output.value = '';
    showError('sql-error', 'エラー: ' + e.message);
    showStatus('sql-status', false, '失敗');
  }
}

document.getElementById('sql-format-btn').addEventListener('click', formatSQL);
document.getElementById('sql-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') formatSQL();
});
document.getElementById('sql-clear-btn').addEventListener('click', () => {
  document.getElementById('sql-input').value = '';
  document.getElementById('sql-output').value = '';
  showError('sql-error', '');
});
document.getElementById('sql-copy-btn').addEventListener('click', () => {
  copyText(document.getElementById('sql-output').value, 'sql-status');
});
document.getElementById('sql-paste-btn').addEventListener('click', () => {
  pasteText('sql-input');
});

// ── JSON ─────────────────────────────────────────────────
function tryUrlDecode(str) {
  // URLエンコードされているか試みる（%XX が含まれていれば）
  if (/%[0-9A-Fa-f]{2}/.test(str)) {
    try { return decodeURIComponent(str); } catch { /* 失敗したら元のまま */ }
  }
  return str;
}

function sortObjectKeys(obj) {
  if (Array.isArray(obj)) return obj.map(sortObjectKeys);
  if (obj !== null && typeof obj === 'object') {
    return Object.keys(obj).sort().reduce((acc, k) => {
      acc[k] = sortObjectKeys(obj[k]);
      return acc;
    }, {});
  }
  return obj;
}

function getIndent() {
  const v = document.getElementById('json-indent').value;
  return v === 'tab' ? '\t' : parseInt(v);
}

function jsonUnescape(str) {
  // \"key\" のようなエスケープ済み文字列をJSONとして復元する
  // JSON文字列としてパースすることで一括処理（\n \t \uXXXX なども対応）
  return JSON.parse('"' + str + '"');
}

function prepareInput() {
  const rawInput = document.getElementById('json-input').value.trim();
  if (!rawInput) return null;
  let text = document.getElementById('json-urldecode').checked ? tryUrlDecode(rawInput) : rawInput;
  if (document.getElementById('json-unescape').checked) text = jsonUnescape(text);
  return text;
}

function doFormatJSON(minify = false) {
  const output = document.getElementById('json-output');
  showError('json-error', '');
  output.classList.remove('error');

  let text;
  try {
    text = prepareInput();
  } catch (e) {
    showError('json-error', 'エスケープ解除エラー: ' + e.message);
    showStatus('json-status', false, '失敗');
    return;
  }
  if (text === null) return;

  const sortKeys = document.getElementById('json-sort').checked;
  try {
    let parsed = JSON.parse(text);
    if (sortKeys) parsed = sortObjectKeys(parsed);
    output.value = minify
      ? JSON.stringify(parsed)
      : JSON.stringify(parsed, null, getIndent());
    showStatus('json-status', true, minify ? '圧縮完了' : '整形完了');
  } catch (e) {
    output.value = '';
    output.classList.add('error');
    showError('json-error', 'JSONパースエラー: ' + e.message);
    showStatus('json-status', false, '失敗');
  }
}

function doEscapeMinify() {
  const output = document.getElementById('json-output');
  showError('json-error', '');
  output.classList.remove('error');

  let text;
  try {
    text = prepareInput();
  } catch (e) {
    showError('json-error', 'エスケープ解除エラー: ' + e.message);
    showStatus('json-status', false, '失敗');
    return;
  }
  if (text === null) return;

  try {
    const parsed   = JSON.parse(text);
    const minified = JSON.stringify(parsed);
    // JSON文字列としてシリアライズして外側のクォートだけ除去 → \"key\":\"val\" 形式
    output.value   = JSON.stringify(minified).slice(1, -1);
    showStatus('json-status', true, 'エスケープ完了');
  } catch (e) {
    output.value = '';
    output.classList.add('error');
    showError('json-error', 'JSONパースエラー: ' + e.message);
    showStatus('json-status', false, '失敗');
  }
}

function doUrlDecodeOnly() {
  const rawInput = document.getElementById('json-input').value.trim();
  const output   = document.getElementById('json-output');

  showError('json-error', '');
  if (!rawInput) return;

  try {
    output.value = decodeURIComponent(rawInput);
    showStatus('json-status', true, 'デコード完了');
  } catch (e) {
    showError('json-error', 'URLデコードエラー: ' + e.message);
    showStatus('json-status', false, '失敗');
  }
}

document.getElementById('json-format-btn').addEventListener('click', () => doFormatJSON(false));
document.getElementById('json-minify-btn').addEventListener('click', () => doFormatJSON(true));
document.getElementById('json-escape-minify-btn').addEventListener('click', doEscapeMinify);
document.getElementById('json-urldecode-only-btn').addEventListener('click', doUrlDecodeOnly);
document.getElementById('json-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doFormatJSON(false);
});
document.getElementById('json-clear-btn').addEventListener('click', () => {
  document.getElementById('json-input').value = '';
  document.getElementById('json-output').value = '';
  showError('json-error', '');
});
document.getElementById('json-copy-btn').addEventListener('click', () => {
  copyText(document.getElementById('json-output').value, 'json-status');
});
document.getElementById('json-paste-btn').addEventListener('click', () => {
  pasteText('json-input');
});

// ── RDB 変換 ──────────────────────────────────────────────

// 対応する閉じ括弧の位置を返す（start は開き括弧の次の位置）
function findClose(str, start) {
  let d = 1, i = start;
  while (i < str.length && d > 0) {
    if (str[i] === '(') d++;
    else if (str[i] === ')') d--;
    i++;
  }
  return i - 1;
}

// depth=0 のカンマで分割
function splitArgs(str) {
  const args = []; let d = 0, buf = '';
  for (const ch of str) {
    if (ch === '(') d++; else if (ch === ')') d--;
    if (ch === ',' && d === 0) { args.push(buf.trim()); buf = ''; } else buf += ch;
  }
  if (buf.trim()) args.push(buf.trim());
  return args;
}

// depth=0 の AND で分割
function splitByAnd(str) {
  const parts = []; let d = 0, buf = '', i = 0;
  while (i < str.length) {
    if (str[i] === '(') d++; else if (str[i] === ')') d--;
    const andMatch = d === 0 && /^AND\s/i.test(str.slice(i)) && (i === 0 || !/\w/.test(str[i - 1]));
    if (andMatch) { parts.push(buf.trim()); buf = ''; i += 4; continue; }
    buf += str[i++];
  }
  if (buf.trim()) parts.push(buf.trim());
  return parts;
}

// DECODE(expr, s1,r1 [,s2,r2...] [,default]) → CASE WHEN ... END
function convertDecode(sql) {
  const re = /\bDECODE\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const content = sql.substring(cs, cl);
    if (/\bDECODE\s*\(/i.test(content)) { re.lastIndex = m.index + 1; continue; }
    const args = splitArgs(content);
    let rep = m[0] + content + ')';
    if (args.length >= 3) {
      const expr = args[0]; let c = 'CASE';
      for (let i = 1; i + 1 < args.length; i += 2)
        c += ` WHEN ${expr} = ${args[i]} THEN ${args[i + 1]}`;
      if ((args.length - 1) % 2 === 1) c += ` ELSE ${args[args.length - 1]}`;
      rep = c + ' END';
    }
    sql = sql.slice(0, m.index) + rep + sql.slice(cl + 1);
    re.lastIndex = m.index;
  }
  return sql;
}

// NVL2(a,b,c) → CASE WHEN a IS NOT NULL THEN b ELSE c END
function convertNvl2(sql) {
  const re = /\bNVL2\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const args = splitArgs(sql.substring(cs, cl));
    if (args.length === 3) {
      const rep = `CASE WHEN ${args[0]} IS NOT NULL THEN ${args[1]} ELSE ${args[2]} END`;
      sql = sql.slice(0, m.index) + rep + sql.slice(cl + 1);
      re.lastIndex = m.index;
    }
  }
  return sql;
}

// ADD_MONTHS(date, n) → (date + make_interval(months => n))
function convertAddMonths(sql) {
  const re = /\bADD_MONTHS\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const args = splitArgs(sql.substring(cs, cl));
    if (args.length === 2) {
      const rep = `(${args[0]} + make_interval(months => ${args[1]}))`;
      sql = sql.slice(0, m.index) + rep + sql.slice(cl + 1);
      re.lastIndex = m.index;
    }
  }
  return sql;
}

// INSTR(str, sub) → POSITION(sub IN str)  ※2引数のみ
function convertInstr(sql) {
  const re = /\bINSTR\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const args = splitArgs(sql.substring(cs, cl));
    if (args.length === 2) {
      sql = sql.slice(0, m.index) + `POSITION(${args[1]} IN ${args[0]})` + sql.slice(cl + 1);
      re.lastIndex = m.index;
    }
  }
  return sql;
}

// POSITION(sub IN str) → INSTR(str, sub)
function convertPosition(sql) {
  const re = /\bPOSITION\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const inner = sql.substring(cs, cl);
    const im = inner.match(/^([\s\S]+?)\s+IN\s+([\s\S]+)$/i);
    if (im) {
      sql = sql.slice(0, m.index) + `INSTR(${im[2].trim()}, ${im[1].trim()})` + sql.slice(cl + 1);
      re.lastIndex = m.index;
    }
  }
  return sql;
}

// SUBSTRING(str FROM pos [FOR len]) / SUBSTRING(str,pos,len) → SUBSTR
function convertSubstring(sql) {
  const re = /\bSUBSTRING\s*\(/gi; let m;
  while ((m = re.exec(sql)) !== null) {
    const cs = m.index + m[0].length;
    const cl = findClose(sql, cs);
    const inner = sql.substring(cs, cl);
    const m1 = inner.match(/^([\s\S]+?)\s+FROM\s+(\S+)\s+FOR\s+([\s\S]+)$/i);
    const m2 = inner.match(/^([\s\S]+?)\s+FROM\s+([\s\S]+)$/i);
    const rep = m1 ? `SUBSTR(${m1[1].trim()}, ${m1[2].trim()}, ${m1[3].trim()})`
               : m2 ? `SUBSTR(${m2[1].trim()}, ${m2[2].trim()})`
               : `SUBSTR(${inner})`;
    sql = sql.slice(0, m.index) + rep + sql.slice(cl + 1);
    re.lastIndex = m.index;
  }
  return sql;
}

// Oracle (+) 外部結合 → LEFT OUTER JOIN（サブクエリ再帰対応）

// キーワードを括弧深度 0 の位置で検索
function findOuterIdx(sql, kw) {
  let d = 0;
  for (let i = 0; i <= sql.length - kw.length; i++) {
    if (sql[i] === '(') { d++; continue; }
    if (sql[i] === ')') { d--; continue; }
    if (d !== 0) continue;
    if (sql.substring(i, i + kw.length).toUpperCase() === kw.toUpperCase()) {
      const ok0 = i === 0 || !/\w/.test(sql[i - 1]);
      const ok1 = i + kw.length >= sql.length || !/\w/.test(sql[i + kw.length]);
      if (ok0 && ok1) return i;
    }
  }
  return -1;
}

// 深度 0 のカンマで分割（括弧内の , は無視）
function splitOuter(str) {
  const parts = []; let d = 0, buf = '';
  for (let i = 0; i < str.length; i++) {
    if (str[i] === '(') d++; else if (str[i] === ')') d--;
    if (d === 0 && str[i] === ',') { parts.push(buf.trim()); buf = ''; }
    else buf += str[i];
  }
  parts.push(buf.trim());
  return parts.filter(Boolean);
}

// テーブル参照のパース（サブクエリ対応）
function parseTableRef(t) {
  t = t.trim();
  if (t.startsWith('(')) {
    const cl = findClose(t, 1);
    const rest = t.substring(cl + 1).replace(/^\s*(?:AS\s+)?/i, '').trim();
    return { isSubquery: true, subq: t.substring(1, cl), alias: rest.split(/\s/)[0] || '_sub' };
  }
  const m = t.match(/^(\S+)\s+(?:AS\s+)?(\S+)$/i);
  return m ? { ref: m[1], alias: m[2] } : { ref: t, alias: t };
}

function tableRefStr(t) {
  return t.isSubquery
    ? `(${t.subq}) ${t.alias}`
    : (t.alias.toUpperCase() === t.ref.toUpperCase() ? t.ref : `${t.ref} ${t.alias}`);
}

// 現在の階層のフラットな (+) 変換
function convertOuterJoinFlat(sql) {
  const fi = findOuterIdx(sql, 'FROM');
  const wi = findOuterIdx(sql, 'WHERE');
  if (fi < 0 || wi < 0 || wi <= fi) return sql;

  // WHERE 句の終端を深度 0 で探す（GROUP BY / ORDER BY / HAVING）
  const postWhere = sql.substring(wi + 5);
  let splitAt = postWhere.length, d = 0;
  for (let i = 0; i < postWhere.length; i++) {
    if (postWhere[i] === '(') { d++; continue; }
    if (postWhere[i] === ')') { d--; continue; }
    if (d !== 0 || (i > 0 && /\w/.test(postWhere[i - 1]))) continue;
    const up = postWhere.substring(i).toUpperCase();
    if (up.match(/^(?:GROUP|ORDER)\s+BY\b/) || up.match(/^HAVING\b/)) { splitAt = i; break; }
  }

  const fromClause  = sql.substring(fi + 4, wi).trim();
  const whereClause = postWhere.substring(0, splitAt).trim();
  const tail        = postWhere.substring(splitAt);

  const tables = splitOuter(fromClause).map(parseTableRef);
  if (tables.length < 2) return sql;

  // 結合される側のテーブル（tables.slice(1)）の別名一覧
  const sliceAliases = tables.slice(1).map(t => (t.alias || t.ref || '').toUpperCase());

  const joinInfo = {}, fconds = [];
  for (const cond of splitByAnd(whereClause)) {
    const m1 = cond.match(/^\s*(\w+)\.(\w+)\s*=\s*(\w+)\.(\w+)\s*\(\+\)\s*$/i); // a.col = b.col(+)  → b が外部表
    const m2 = cond.match(/^\s*(\w+)\.(\w+)\s*\(\+\)\s*=\s*(\w+)\.(\w+)\s*$/i); // a.col(+) = b.col  → a が外部表
    let outerAlias, preservedAlias, joinCond;
    if (m1) {
      preservedAlias = m1[1].toUpperCase(); outerAlias = m1[3].toUpperCase();
      joinCond = `${m1[1]}.${m1[2]} = ${m1[3]}.${m1[4]}`;
    } else if (m2) {
      outerAlias = m2[1].toUpperCase(); preservedAlias = m2[3].toUpperCase();
      joinCond = `${m2[1]}.${m2[2]} = ${m2[3]}.${m2[4]}`;
    } else { fconds.push(cond); continue; }

    // 結合対象テーブルが外部表側 → LEFT OUTER JOIN
    // 結合対象テーブルが保持側で、相手（基底側）が外部表 → RIGHT OUTER JOIN
    if (sliceAliases.includes(outerAlias)) {
      (joinInfo[outerAlias] = joinInfo[outerAlias] || { type: 'LEFT OUTER JOIN', conditions: [] }).conditions.push(joinCond);
    } else if (sliceAliases.includes(preservedAlias)) {
      (joinInfo[preservedAlias] = joinInfo[preservedAlias] || { type: 'RIGHT OUTER JOIN', conditions: [] }).conditions.push(joinCond);
    } else {
      fconds.push(cond);
    }
  }

  let from = 'FROM ' + tableRefStr(tables[0]) + '\n';
  for (const t of tables.slice(1)) {
    const info = joinInfo[(t.alias || t.ref || '').toUpperCase()];
    from += info
      ? `${info.type} ${tableRefStr(t)}\n  ON ${info.conditions.join('\n  AND ')}\n`
      : `CROSS JOIN ${tableRefStr(t)}\n`;
  }
  if (fconds.length) from += 'WHERE ' + fconds.join('\n  AND ');

  return sql.substring(0, fi) + from + tail;
}

// サブクエリを再帰的に処理してから自分の階層を変換
function convertOuterJoin(sql) {
  if (!/\(\+\)/.test(sql)) return sql;
  // 末尾のセミコロンを一時退避（WHERE条件の正規表現マッチを妨げないため）
  const semiMatch = sql.match(/(\s*;+\s*)$/);
  const trailSemi = semiMatch ? semiMatch[1] : '';
  if (trailSemi) sql = sql.slice(0, -trailSemi.length);
  // Step1: 括弧内のサブクエリを再帰処理
  let out = ''; let i = 0;
  while (i < sql.length) {
    if (sql[i] === '(') {
      const cl = findClose(sql, i + 1);
      const inner = sql.substring(i + 1, cl);
      out += /\bSELECT\b/i.test(inner)
        ? '(' + convertOuterJoin(inner) + ')'  // サブクエリ → 再帰
        : '(' + inner + ')';                   // 条件グループ → そのまま
      i = cl + 1;
    } else out += sql[i++];
  }
  // Step2: 現在の階層を変換してセミコロンを復元
  return convertOuterJoinFlat(out) + trailSemi;
}

const ORA2PG = [
  { d: 'DECODE → CASE WHEN ... END',         fn: convertDecode },
  { d: 'NVL2 → CASE WHEN IS NOT NULL',        fn: convertNvl2 },
  { d: 'NVL → COALESCE',                      fn: s => s.replace(/\bNVL\s*\(/gi, 'COALESCE(') },
  { d: 'ADD_MONTHS → make_interval',           fn: convertAddMonths },
  { d: 'SYSDATE → CURRENT_TIMESTAMP',         fn: s => s.replace(/\bSYSDATE\b/gi, 'CURRENT_TIMESTAMP') },
  { d: 'SYSTIMESTAMP → CURRENT_TIMESTAMP',    fn: s => s.replace(/\bSYSTIMESTAMP\b/gi, 'CURRENT_TIMESTAMP') },
  { d: 'FROM DUAL を削除',                    fn: s => s.replace(/\bFROM\s+DUAL\b/gi, '').replace(/,\s*DUAL\b/gi, '') },
  { d: 'MINUS → EXCEPT',                      fn: s => s.replace(/\bMINUS\b/gi, 'EXCEPT') },
  { d: 'VARCHAR2 → VARCHAR',                  fn: s => s.replace(/\bVARCHAR2\b/gi, 'VARCHAR') },
  { d: 'NUMBER( → NUMERIC(',                  fn: s => s.replace(/\bNUMBER\b(?=\s*\()/gi, 'NUMERIC') },
  { d: 'SUBSTR → SUBSTRING',                  fn: s => s.replace(/\bSUBSTR\s*\(/gi, 'SUBSTRING(') },
  { d: 'INSTR → POSITION',                    fn: convertInstr },
  { d: "seq.NEXTVAL → NEXTVAL('seq')",         fn: s => s.replace(/\b(\w+)\.NEXTVAL\b/gi, "NEXTVAL('$1')") },
  { d: "seq.CURRVAL → CURRVAL('seq')",         fn: s => s.replace(/\b(\w+)\.CURRVAL\b/gi, "CURRVAL('$1')") },
  { d: '(+) 外部結合 → LEFT OUTER JOIN',      fn: convertOuterJoin },
];

const PG2ORA = [
  { d: 'SUBSTRING → SUBSTR',                  fn: convertSubstring },
  { d: 'POSITION → INSTR',                    fn: convertPosition },
  { d: '::キャスト → CAST(x AS type)',        fn: s => s.replace(/\b(\w+)\s*::\s*(\w+)\b/g, 'CAST($1 AS $2)') },
  { d: 'CURRENT_DATE → TRUNC(SYSDATE)',        fn: s => s.replace(/\bCURRENT_DATE\b/gi, 'TRUNC(SYSDATE)') },
  { d: 'CURRENT_TIMESTAMP → SYSTIMESTAMP',    fn: s => s.replace(/\bCURRENT_TIMESTAMP\b/gi, 'SYSTIMESTAMP') },
  { d: 'NOW() → SYSDATE',                     fn: s => s.replace(/\bNOW\s*\(\s*\)/gi, 'SYSDATE') },
  { d: 'EXCEPT → MINUS',                      fn: s => s.replace(/\bEXCEPT\b/gi, 'MINUS') },
  { d: 'LIMIT n → FETCH FIRST n ROWS ONLY',   fn: s => s.replace(/\bLIMIT\s+(\d+)\b/gi, 'FETCH FIRST $1 ROWS ONLY') },
  { d: 'OFFSET n → OFFSET n ROWS',            fn: s => s.replace(/\bOFFSET\s+(\d+)\b/gi, 'OFFSET $1 ROWS') },
  { d: 'VARCHAR → VARCHAR2',                  fn: s => s.replace(/\bVARCHAR\b(?!\s*2)/gi, 'VARCHAR2') },
  { d: 'TEXT → VARCHAR2(4000)',               fn: s => s.replace(/\bTEXT\b/gi, 'VARCHAR2(4000)') },
  { d: 'DATE_TRUNC → TRUNC',                  fn: s => s.replace(/\bDATE_TRUNC\s*\(\s*'[^']+'\s*,\s*([^)]+)\)/gi, 'TRUNC($1)') },
  { d: "NEXTVAL('seq') → seq.NEXTVAL",        fn: s => s.replace(/\bNEXTVAL\s*\(\s*'(\w+)'\s*\)/gi, '$1.NEXTVAL') },
  { d: "CURRVAL('seq') → seq.CURRVAL",        fn: s => s.replace(/\bCURRVAL\s*\(\s*'(\w+)'\s*\)/gi, '$1.CURRVAL') },
  { d: 'ILIKE → UPPER() LIKE UPPER()',        fn: s => s.replace(/(\w+)\s+ILIKE\s+(\S+)/gi, 'UPPER($1) LIKE UPPER($2)') },
  { d: 'TRUE/FALSE → 1/0',                    fn: s => s.replace(/\bTRUE\b/gi, '1').replace(/\bFALSE\b/gi, '0') },
];

let convDirection = 'ora2pg';

document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    convDirection = btn.dataset.dir;
  });
});

function doConvert() {
  const input  = document.getElementById('conv-input').value.trim();
  const output = document.getElementById('conv-output');
  showError('conv-error', '');
  if (!input) return;

  const rules = convDirection === 'ora2pg' ? ORA2PG : PG2ORA;
  let sql = input;
  const applied = [];
  for (const rule of rules) {
    const before = sql;
    try { sql = rule.fn(sql); } catch { /* 変換失敗はスキップ */ }
    if (sql !== before) applied.push(rule.d);
  }

  if (document.getElementById('conv-format').checked) {
    const dialect = convDirection === 'ora2pg' ? 'postgresql' : 'oracle';
    try {
      sql = sqlFormatter.format(sql, { language: dialect, keywordCase: 'upper', indentStyle: 'standard', tabWidth: 4 });
      sql = postProcessJoinOn(sql);
      applied.push('SQL整形');
    } catch { /* 整形失敗はスキップ */ }
  }

  output.value = sql;

  const logDiv  = document.getElementById('conv-log');
  const logList = document.getElementById('conv-log-list');
  if (applied.length > 0) {
    logDiv.style.display = 'block';
    logList.innerHTML = applied.map(d => `<div class="log-item">${d}</div>`).join('');
    showStatus('conv-status', true, `${applied.length}件変換`);
  } else {
    logDiv.style.display = 'none';
    showStatus('conv-status', true, '変換対象なし');
  }
}

document.getElementById('conv-btn').addEventListener('click', doConvert);
document.getElementById('conv-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doConvert();
});
document.getElementById('conv-clear-btn').addEventListener('click', () => {
  document.getElementById('conv-input').value = '';
  document.getElementById('conv-output').value = '';
  document.getElementById('conv-log').style.display = 'none';
  showError('conv-error', '');
});
document.getElementById('conv-copy-btn').addEventListener('click', () => {
  copyText(document.getElementById('conv-output').value, 'conv-status');
});
document.getElementById('conv-paste-btn').addEventListener('click', () => {
  pasteText('conv-input');
});
</script>
